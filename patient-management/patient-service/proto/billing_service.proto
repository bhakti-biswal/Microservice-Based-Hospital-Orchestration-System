syntax = "proto3";

package billing;

service BillingService {
  rpc CreateBillingAccount(BillingRequest) returns (BillingResponse);
  rpc GetBillingAccount(BillingQuery) returns (BillingResponse);
  rpc UpdateBillingAccount(BillingUpdateRequest) returns (BillingResponse);
}

message BillingRequest {
  string patient_id = 1;
  string patient_name = 2;
  string email = 3;
  string address = 4;
}

message BillingQuery {
  string patient_id = 1;
}

message BillingUpdateRequest {
  string patient_id = 1;
  string patient_name = 2;
  string email = 3;
  string address = 4;
}

message BillingResponse {
  string account_id = 1;
  string patient_id = 2;
  string patient_name = 3;
  string status = 4;
  string message = 5;
}
