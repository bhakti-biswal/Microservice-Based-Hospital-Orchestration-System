version: "3.8"

# ╔══════════════════════════════════════════════════════════════════════════╗
# ║          Patient Management System — Docker Compose                     ║
# ║                                                                          ║
# ║  Services:                                                               ║
# ║    Infrastructure : Zookeeper, Kafka                                     ║
# ║    Microservices  : auth, patient, billing, analytics, notification      ║
# ║    Gateway        : api-gateway (port 8000)                              ║
# ╚══════════════════════════════════════════════════════════════════════════╝

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - patient-network

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 15
    networks:
      - patient-network

  # ── Microservices ────────────────────────────────────────────────────────────

  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    ports:
      - "8001:8001"
    environment:
      SECRET_KEY: "super-secret-jwt-key-change-in-production-!!!!"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - patient-network

  billing-service:
    build:
      context: ./billing-service
    container_name: billing-service
    ports:
      - "50051:50051"
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; ch=grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - patient-network

  patient-service:
    build:
      context: ./patient-service
    container_name: patient-service
    ports:
      - "8002:8002"
    depends_on:
      kafka:
        condition: service_healthy
      billing-service:
        condition: service_started
    environment:
      BILLING_SERVICE_URL: billing-service:50051
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - patient-network

  analytics-service:
    build:
      context: ./analytics-service
    container_name: analytics-service
    ports:
      - "8003:8003"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - patient-network

  notification-service:
    build:
      context: ./notification-service
    container_name: notification-service
    ports:
      - "8004:8004"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - patient-network

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    ports:
      - "8000:8000"
    depends_on:
      auth-service:
        condition: service_healthy
      patient-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    environment:
      AUTH_SERVICE_URL: http://auth-service:8001
      PATIENT_SERVICE_URL: http://patient-service:8002
      ANALYTICS_SERVICE_URL: http://analytics-service:8003
      NOTIFICATION_SERVICE_URL: http://notification-service:8004
    networks:
      - patient-network

# ── Network ───────────────────────────────────────────────────────────────────
networks:
  patient-network:
    driver: bridge
    name: patient-network
